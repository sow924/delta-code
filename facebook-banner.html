<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLog Facebook Banner</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }
        .banner {
            width: 820px;  /* Facebook banner recommended size */
            height: 312px;
            background-color: #0078D4;  /* Example color for the banner */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            font-size: 2em;
            position: relative;
        }
        .logo {
            position: absolute;
            top: 20px;
            width: 150px;
            height: auto;
        }
        .text {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="banner">
        <img src="path_to_devlog_logo.png" alt="DevLog Logo" class="logo">
        <div class="text">
            Welcome to DevLog!<br>
            Join us for the latest updates and insights!
        </div>
    </div>
</body>
</html>
