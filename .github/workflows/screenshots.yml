name: Generate Screenshots

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          npm install

      - name: Generate screenshots
        run: |
          npx puppeteer-cli capture 'http://example.com' --output screenshots/example.png
